################################################################################
#                          KEYBOARD SHORTCUTS                                  #
#                                                                              #
# Custom key bindings for mpv. These override or add to default shortcuts.    #
#                                                                              #
# See full default key bindings:                                               #
# https://mpv.io/manual/master/#interactive-control                           #
################################################################################

# ============================================================================ #
#                           SUBTITLE CONTROLS                                  #
# ============================================================================ #

# Toggle subtitle style override (k key)
# First press: Force custom subtitle style (ignore original formatting)
# Second press: Restore original subtitle style
k cycle_values sub-ass-override "force" "no"


# ============================================================================ #
#                           SHADER CONTROLS                                    #
# ============================================================================ #

# Display currently active shaders (\ key)
# Shows list of loaded GLSL shaders in OSD
\ show-text ${glsl-shaders}

# Clear all shaders (Ctrl+0)
# Removes all active shaders for best performance
CTRL+0 no-osd change-list glsl-shaders clr ""; show-text "GLSL shaders cleared"

# Load ArtCNN C4F16 + Adaptive Sharpen (Ctrl+1)
# AI upscaling with 16 filters - balanced quality/performance
CTRL+1 no-osd change-list glsl-shaders set "~~/shaders/ArtCNN_C4F16.glsl;~~/shaders/Adaptive-Sharpen.glsl"; show-text "ArtCNN C4F16 + Adaptive Sharpen"

# Load ArtCNN C4F32 + Adaptive Sharpen (Ctrl+2)
# AI upscaling with 32 filters - maximum quality, slower
CTRL+2 no-osd change-list glsl-shaders set "~~/shaders/ArtCNN_C4F32.glsl;~~/shaders/Adaptive-Sharpen.glsl"; show-text "ArtCNN C4F32 + Adaptive Sharpen"

# Load Ravu Lite + Noise (Ctrl+3)
# Traditional upscaling algorithm with film grain
CTRL+3 no-osd change-list glsl-shaders set "~~/shaders/ravu-lite-ar-r4.hook;~~/shaders/noise-static-luma.hook"; show-text "Ravu Lite AR R4 + Noise Static Luma"

# Load Ravu Zoom + Noise (Ctrl+4)
# Optimized for zoomed/cropped content with film grain
CTRL+4 no-osd change-list glsl-shaders set "~~/shaders/ravu-zoom-ar-r3.hook;~~/shaders/noise-static-luma.hook"; show-text "Ravu Zoom AR R3 + Noise Static Luma"
