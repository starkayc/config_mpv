<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <description>mpv portable fonts only</description>

    <!-- Relative path to fonts folder -->
    <dir>~~/.fonts</dir>

    <!-- Optional aliases for monospace and sans fonts -->
    <match target="pattern">
        <test qual="any" name="family">
            <string>mono</string>
        </test>
        <edit name="family" mode="assign" binding="same">
            <string>monospace</string>
        </edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family">
            <string>sans</string>
        </test>
        <edit name="family" mode="assign" binding="same">
            <string>sans-serif</string>
        </edit>
    </match>

    <!-- Cache folder for fontconfig (also relative) -->
    <cachedir>~~/cache/fontconfig</cachedir>
</fontconfig>